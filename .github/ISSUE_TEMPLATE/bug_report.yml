name: 🐛 Bug Report
description: Report a defect or unexpected behavior in a Vulthil package.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please search
        [existing issues](https://github.com/Vulthil/Vulthil.SharedKernel/issues) first to
        avoid duplicates, then fill out the sections below.

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      description: Which package does this bug relate to?
      options:
        - Vulthil.Results
        - Vulthil.SharedKernel
        - Vulthil.SharedKernel.Application
        - Vulthil.SharedKernel.Infrastructure
        - Vulthil.SharedKernel.Api
        - Vulthil.Messaging.Abstractions
        - Vulthil.Messaging
        - Vulthil.Messaging.RabbitMq
        - Vulthil.Messaging.TestHarness
        - Vulthil.Extensions.Testing
        - Vulthil.xUnit
        - Not sure / multiple
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Which version of the package are you using?
      placeholder: e.g. 1.4.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal set of steps (or a code snippet) that reproduces the issue.
      placeholder: |
        1. Configure '...'
        2. Call '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include exception messages and stack traces if available.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details.
      value: |
        - .NET SDK version:
        - OS:
        - IDE / runtime:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / additional context
      description: Add any other context, logs, or screenshots about the problem here.
      render: shell
    validations:
      required: false
