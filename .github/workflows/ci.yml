name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Build
        run: dotnet build -c Release

      - name: Test with coverage
        run: >
          dotnet test -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Restore tools
        run: dotnet tool restore

      - name: Generate coverage report & badges
        run: >
          dotnet reportgenerator
          -reports:"./TestResults/**/coverage.cobertura.xml"
          -targetdir:"./CoverageReport"
          -reporttypes:"Html;Badges"

      - name: Upload coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./CoverageReport

      - name: Publish coverage badge to Gist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 2852f1400e27493b185559c76b38e9b7
          file_path: ./CoverageReport/badge_combined.svg
          file_type: binary

      # Preview packages — only on PRs from the same repo
      - name: Pack preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: dotnet pack -c Release -o ./artifacts

      - name: Upload artifacts
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts/*

      - name: Publish preview to GitHub Packages
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --skip-duplicate