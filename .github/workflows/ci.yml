name: CI

on:
  push:
    branches: [main, 'v[0-9]+.[0-9]+']
  pull_request:
    branches: [main, 'v[0-9]+.[0-9]+']

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

# Cancel a PR's superseded runs (each push re-queues a full build+test); never
# cancel main/servicing-branch pushes, which run once per merge and whose
# coverage/badge/preview-publish side effects should always complete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Cheap, always-on classification so docs-only changes can skip the heavy
  # `build` job below via a job-level `if:` instead of a workflow-level
  # `paths-ignore`. This matters because main has required status checks: a
  # workflow-level path filter leaves a required check stuck at "Expected"
  # forever on a PR that never touches a matching path, which blocks merging.
  # A job that is *conditionally skipped* still reports conclusion "skipped",
  # which satisfies a required check the same as "success" -- so `build`
  # keeps its exact name and required-check identity, it just doesn't run.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      # No checkout: every changed path comes from the GitHub API, so this
      # job never needs to fetch (trusted or PR-fork) code just to list files.
      - name: Classify this change as docs-only or not
        id: classify
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          # Deliberately no "-e": any failure below must fall through to the
          # "not docs-only" default instead of failing this job outright,
          # which would auto-skip `build` too (a skipped `needs:` job skips
          # its dependents by default).
          set -uo pipefail

          FILES=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            FILES=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename' 2>/dev/null) || FILES=""
          else
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              FILES=$(gh api "repos/$REPO/commits/$AFTER_SHA" --jq '.files[].filename' 2>/dev/null) || FILES=""
            else
              FILES=$(gh api "repos/$REPO/compare/$BEFORE_SHA...$AFTER_SHA" --paginate --jq '.files[].filename' 2>/dev/null) || FILES=""
            fi
          fi

          DOCS_ONLY=false
          if [ -n "$FILES" ]; then
            echo "Changed files:"
            echo "$FILES"
            DOCS_ONLY=true
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                # Package READMEs pack into nupkgs -- never treat a README
                # change as docs-only, no matter where it lives.
                *README.md) DOCS_ONLY=false ;;
                docs/*) ;;
                *) DOCS_ONLY=false ;;
              esac
            done <<< "$FILES"
          else
            echo "::warning::Could not determine changed files -- treating this run as not-docs-only so 'build' still runs."
          fi

          echo "docs_only=$DOCS_ONLY" >> "$GITHUB_OUTPUT"

  build:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-build

      - name: Build
        run: dotnet build -c Release

      - name: Test with coverage
        shell: pwsh
        run: ./eng/coverage.ps1 -NoBuild

      - name: Upload coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./CoverageReport

      # Uses gh api directly instead of a third-party gist-deploy action -- one
      # less individual-maintainer action holding a token in its supply chain.
      - name: Publish coverage badge to Gist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          jq -n --rawfile content ./CoverageReport/badge_combined.svg \
            '{files: {"badge_combined.svg": {content: $content}}}' \
          | gh api --method PATCH /gists/2852f1400e27493b185559c76b38e9b7 --input -

      # Preview (prerelease) packages. main is not a public release ref
      # (version.json), so every CI build carries a prerelease suffix. PRs pack
      # and upload a downloadable artifact for testing; only merges to main are
      # published to the shared feed, so transient PR commits don't pollute it.
      # Package validation (APICompat vs. PackageValidationBaselineVersion) also
      # runs here, i.e. AFTER build+test -- a baseline diff stays latent on any
      # commit where tests already failed and this step didn't run.
      - name: Pack preview
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        run: dotnet pack -c Release -o ./artifacts

      - name: Upload artifacts
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts/*

      # Hands packages to the publish-preview job below, which carries
      # packages: write instead of this job -- keeps that credential out of the
      # job that runs untrusted PR code (dotnet build/test run arbitrary MSBuild
      # targets from the PR).
      - name: Upload preview packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: preview-packages
          path: ./artifacts/*

  # Split from `build` so the packages: write token is never present while
  # building/testing PR code. Only runs for pushes to main, never for PRs
  # (including same-repo ones), so a compromised dependency can't use this
  # token from its own PR build.
  publish-preview:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@v6

      - uses: actions/download-artifact@v8
        with:
          name: preview-packages
          path: ./artifacts

      - name: Publish preview to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --skip-duplicate