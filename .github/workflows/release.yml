name: Release

on:
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-

      # PublicRelease=true forces nbgv to emit a stable version (no prerelease
      # suffix) regardless of branch, so a release can be cut from any branch.
      - name: Build
        run: dotnet build -c Release -p:PublicRelease=true

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack -c Release -p:PublicRelease=true -o ./artifacts

      - name: Resolve version
        id: version
        run: |
          PKG=$(ls ./artifacts/*.nupkg | head -n1)
          VERSION=$(unzip -p "$PKG" '*.nuspec' | sed -n 's:.*<version>\(.*\)</version>.*:\1:p' | head -n1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Publishing version $VERSION"

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag v${{ steps.version.outputs.version }} --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          body_path: CHANGES.md
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --skip-duplicate

      # Uncomment when ready to publish to NuGet.org (requires NUGET_API_KEY secret)
      # - name: Publish to NuGet.org
      #   run: >
      #     dotnet nuget push "./artifacts/*.nupkg"
      #     -k ${{ secrets.NUGET_API_KEY }}
      #     -s https://api.nuget.org/v3/index.json
      #     --skip-duplicate

  # Publish the released version as the default (stable) documentation. Reuses
  # docs.yml so the gh-pages layout and version manifest stay in one place.
  docs:
    needs: release
    permissions:
      contents: write
    uses: ./.github/workflows/docs.yml
    with:
      slug: ${{ needs.release.outputs.version }}
      make_default: true
