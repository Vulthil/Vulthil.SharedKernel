name: Release

on:
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

# Serialize releases so two manual dispatches can't publish the same version twice.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write
      id-token: write   # required for NuGet.org trusted publishing (OIDC)
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-build

      # PublicRelease=true forces nbgv to emit a stable version (no prerelease
      # suffix) regardless of branch, so a release can be cut from any branch.
      - name: Build
        run: dotnet build -c Release -p:PublicRelease=true

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack -c Release -p:PublicRelease=true -o ./artifacts

      - name: Resolve version
        id: version
        run: |
          PKG=$(ls ./artifacts/*.nupkg | head -n1)
          VERSION=$(unzip -p "$PKG" '*.nuspec' | sed -n 's:.*<version>\(.*\)</version>.*:\1:p' | head -n1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Publishing version $VERSION"

      - name: Check version not already released
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::v$VERSION is already released. Bump version.json before dispatching Release again."
            exit 1
          fi

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --unreleased --tag v${{ steps.version.outputs.version }} --strip header
        env:
          OUTPUT: CHANGES.md

      # Uses gh release create directly instead of a third-party release action
      # -- one less individual-maintainer action holding contents: write.
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            ./artifacts/*.nupkg ./artifacts/*.snupkg \
            --repo "${{ github.repository }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file CHANGES.md \
            --target "${{ github.sha }}"

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --skip-duplicate

      # Publish to NuGet.org via Trusted Publishing (OIDC) -- no long-lived API
      # key is stored in GitHub. One-time setup on NuGet.org: create a trusted
      # publisher policy for this repo + the Release workflow, then set the
      # NUGET_USER secret to the owning NuGet.org account/organization name.
      # https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      - name: NuGet login (trusted publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # Publish the released version as the default (stable) documentation. Reuses
  # docs.yml so the gh-pages layout and version manifest stay in one place.
  docs:
    needs: release
    permissions:
      contents: write
    uses: ./.github/workflows/docs.yml
    with:
      slug: ${{ needs.release.outputs.version }}
      make_default: true

  # The APIs that were unshipped are shipped as of this release, so fold each
  # PublicAPI.Unshipped.txt into its sibling PublicAPI.Shipped.txt and open a PR
  # for the result. A fresh checkout keeps the working tree free of build output
  # so only the API files land in the PR. Direct pushes to main are blocked by
  # the branch ruleset, so this mirrors version-bump.yml and goes through a PR.
  mark-api-shipped:
    needs: release
    runs-on: ubuntu-latest
    # Budgeted for the deliberate nuget.org indexing wait below (up to ~20
    # minutes of polling plus a 60s grace sleep) on top of the PR open/
    # approve/merge steps, not just the promotion script itself.
    timeout-minutes: 35
    permissions:
      contents: write      # create the promotion branch
      pull-requests: write # open the PR
    steps:
      - uses: actions/checkout@v7

      - name: Promote unshipped public API
        run: python3 eng/mark_api_shipped.py --version ${{ needs.release.outputs.version }}

      - name: Require automation token
        env:
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          if [ -z "$AUTOMATION_TOKEN" ]; then
            echo "::error::AUTOMATION_TOKEN is not set. The default GITHUB_TOKEN cannot open this PR: pushes made with it do not trigger the required 'build' check, so auto-merge would stall silently."
            exit 1
          fi

      # This PR's baseline bump makes its own CI restore packages at the version
      # that was just published above -- the SDK downloads the baseline version
      # at restore time -- which fails with NU1102 until nuget.org finishes
      # indexing it (observed lag: 5-30 min). Polling one representative package
      # id is a proportionate proxy: all 24 packages publish together in the
      # same job, so their indexing lag tracks closely; the grace sleep after a
      # hit covers the remaining stragglers.
      - name: Wait for nuget.org to index the release
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          PACKAGE_ID="vulthil.sharedkernel"
          INDEX_URL="https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID}/index.json"
          ATTEMPTS=40
          for i in $(seq 1 "$ATTEMPTS"); do
            if curl -fsS "$INDEX_URL" | jq -e --arg v "$VERSION" '.versions | index($v) != null' >/dev/null; then
              echo "nuget.org has indexed $PACKAGE_ID $VERSION. Grace sleep for the rest of the set..."
              sleep 60
              exit 0
            fi
            echo "Attempt $i/$ATTEMPTS: $PACKAGE_ID $VERSION not yet indexed on nuget.org; retrying in 30s."
            sleep 30
          done
          echo "::error::nuget.org did not index $PACKAGE_ID $VERSION within ~20 minutes. This PR's build will fail with NU1102 until indexing completes -- re-run the failed check once nuget.org catches up."
          exit 1

      - name: Open public API promotion PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          # AUTOMATION_TOKEN lets the required `build` check run on the PR; with
          # the default GITHUB_TOKEN, pushes from a workflow do not trigger CI.
          # Enforced by the "Require automation token" step above -- no fallback.
          token: ${{ secrets.AUTOMATION_TOKEN }}
          add-paths: |
            src/**/PublicAPI.*.txt
            Directory.Build.props
          branch: chore/mark-api-shipped-${{ needs.release.outputs.version }}
          delete-branch: true
          commit-message: "chore: mark public API shipped for v${{ needs.release.outputs.version }}"
          title: "chore: mark public API shipped for v${{ needs.release.outputs.version }}"
          labels: automated
          body: |
            Promotes the unshipped public API surface to shipped for **v${{ needs.release.outputs.version }}** and bumps `PackageValidationBaselineVersion` to match.

            Each `PublicAPI.Unshipped.txt` was folded into its sibling `PublicAPI.Shipped.txt` and reset to the `#nullable enable` header. Merge this so the next development cycle starts from a clean unshipped surface and package validation compares against the release that just shipped.

      # Hands-off promotion, mirroring the dependabot auto-approve-and-merge flow.
      # Approve with GITHUB_TOKEN (the github-actions[bot] identity) so the review
      # comes from someone other than the AUTOMATION_TOKEN that opened the PR --
      # GitHub forbids self-approval, so this assumes AUTOMATION_TOKEN is a
      # distinct identity. Then queue the merge once the required `build` check
      # passes. Both steps are skipped when no APIs changed and no PR was opened.
      - name: Approve the promotion PR
        if: steps.cpr.outputs.pull-request-number
        run: gh pr review --approve "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Each branch's mark-api-shipped bumps ITS OWN PackageValidationBaselineVersion
  # only. After a servicing release (e.g. 1.0.2 from v1.0), main should also
  # move to the new version -- every branch validates its packages against the
  # newest release it must stay compatible with. This is one-directional by
  # construction: it only ever targets main, and eng/propagate_baseline.py only
  # ever raises a version, never lowers one. A release dispatched from main
  # skips this job entirely via the `if` below, since main's own
  # mark-api-shipped run already bumped main's baseline for this release.
  # Never run the reverse (bumping a servicing branch's baseline to a newer
  # minor from main) -- that would validate the servicing branch's packages
  # against APIs it doesn't have yet and flag them all as removals.
  propagate-baseline-to-main:
    needs: release
    if: github.ref_name != github.event.repository.default_branch
    runs-on: ubuntu-latest
    # Same deliberate nuget.org indexing wait as mark-api-shipped's gate when
    # a bump is actually needed; skipped output is fast, but this must budget
    # for the slow path (see that job's comment for the exact math).
    timeout-minutes: 35
    permissions:
      contents: write      # create the propagation branch
      pull-requests: write # open the PR
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Compute propagated baseline
        id: propagate
        run: python3 eng/propagate_baseline.py --released-version ${{ needs.release.outputs.version }}

      - name: Require automation token
        if: steps.propagate.outputs.bumped == 'true'
        env:
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          if [ -z "$AUTOMATION_TOKEN" ]; then
            echo "::error::AUTOMATION_TOKEN is not set. The default GITHUB_TOKEN cannot open this PR: pushes made with it do not trigger the required 'build' check, so auto-merge would stall silently."
            exit 1
          fi

      # Same NU1102 race as mark-api-shipped's gate, repeated here rather than
      # extracted: this PR also bumps a baseline that restores the
      # just-published packages. Skipped when nothing was bumped above, since
      # there is no PR -- and therefore no restore -- to protect.
      - name: Wait for nuget.org to index the release
        if: steps.propagate.outputs.bumped == 'true'
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          PACKAGE_ID="vulthil.sharedkernel"
          INDEX_URL="https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID}/index.json"
          ATTEMPTS=40
          for i in $(seq 1 "$ATTEMPTS"); do
            if curl -fsS "$INDEX_URL" | jq -e --arg v "$VERSION" '.versions | index($v) != null' >/dev/null; then
              echo "nuget.org has indexed $PACKAGE_ID $VERSION. Grace sleep for the rest of the set..."
              sleep 60
              exit 0
            fi
            echo "Attempt $i/$ATTEMPTS: $PACKAGE_ID $VERSION not yet indexed on nuget.org; retrying in 30s."
            sleep 30
          done
          echo "::error::nuget.org did not index $PACKAGE_ID $VERSION within ~20 minutes. This PR's build will fail with NU1102 until indexing completes -- re-run the failed check once nuget.org catches up."
          exit 1

      - name: Open baseline propagation PR
        id: cpr
        if: steps.propagate.outputs.bumped == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          # AUTOMATION_TOKEN lets the required `build` check run on the PR; with
          # the default GITHUB_TOKEN, pushes from a workflow do not trigger CI.
          # Enforced by the "Require automation token" step above -- no fallback.
          token: ${{ secrets.AUTOMATION_TOKEN }}
          add-paths: Directory.Build.props
          branch: chore/baseline-${{ needs.release.outputs.version }}-to-main
          delete-branch: true
          commit-message: "chore: validate packages against the ${{ needs.release.outputs.version }} baseline"
          title: "chore: validate packages against the ${{ needs.release.outputs.version }} baseline"
          labels: automated
          body: |
            **${{ github.ref_name }}** released **v${{ needs.release.outputs.version }}**. This raises main's `PackageValidationBaselineVersion` to match, so main keeps validating its packages against the newest release it must stay compatible with.

      - name: Approve the propagation PR
        if: steps.cpr.outputs.pull-request-number
        run: gh pr review --approve "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
