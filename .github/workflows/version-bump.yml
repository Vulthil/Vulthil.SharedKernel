name: Manual Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of bump'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the bump branch
      pull-requests: write # open the PR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: python3 .github/scripts/bump_version.py "${{ github.event.inputs.bump_type }}"

      - name: Open version bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          # A PAT or GitHub App token (AUTOMATION_TOKEN) lets the required `build`
          # check run on the PR. With the default GITHUB_TOKEN, pushes from this
          # workflow do not trigger CI, so an admin must bypass the ruleset to merge.
          token: ${{ secrets.AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          add-paths: version.json
          branch: chore/version-bump
          delete-branch: true
          commit-message: "chore: bump version to ${{ steps.bump.outputs.version }}"
          title: "chore: bump version to ${{ steps.bump.outputs.version }}"
          labels: automated
          body: |
            Automated `${{ github.event.inputs.bump_type }}` bump of `version.json` to **${{ steps.bump.outputs.version }}**.

            Merge this PR before running the **Release** workflow so the next release picks up the new version.
