[changelog]
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    # Release-automation commits (mark-api-shipped, version-bump, and baseline-propagation PRs) are
    # process noise in consumer-facing notes. Parsers are first-match-wins, so these skips must stay
    # above the generic ^chore parser; the patterns anchor to the exact commit-message templates in
    # release.yml and version-bump.yml.
    { message = "^chore: mark public API shipped", skip = true },
    { message = "^chore: bump version to", skip = true },
    { message = "^chore: validate packages against", skip = true },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI/CD" },
    { message = "^build", group = "Build & Dependencies" },
    { message = "^style", group = "Styling" },
    { message = "^revert", group = "Reverts" },
]
